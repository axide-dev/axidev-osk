name: Setup Python Environment
description: Set up Python for CI jobs.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.14"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
