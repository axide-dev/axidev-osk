name: Setup Windows Runner
description: Set up Python for Windows CI jobs.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.14"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: ./.github/actions/setup-python-env
      with:
        python-version: ${{ inputs.python-version }}
