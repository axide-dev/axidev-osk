name: Reusable Standalone Windows

on:
  workflow_call:
    inputs:
      version-label:
        description: Version label used in the standalone archive filename.
        required: true
        type: string
      artifact-name:
        description: Uploaded artifact name.
        required: false
        default: standalone-app-Windows
        type: string

jobs:
  build:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up runner
        uses: ./.github/actions/setup-windows-runner

      - name: Install Python packaging tools
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build vendored axidev-io stack
        uses: ./.github/actions/build-vendored-axidev-io-windows
        with:
          package-version: ${{ inputs.version-label }}

      - name: Install vendored axidev-io-python
        run: python -m pip install ./vendor/axidev-io-python

      - name: Install axidev-osk
        run: python -m pip install .

      - name: Build standalone app archive
        run: python scripts/build_standalone.py --version "${{ inputs.version-label }}" --arch x64

      - name: Verify standalone app archive contents
        shell: pwsh
        env:
          VERSION_LABEL: ${{ inputs.version-label }}
        run: |
          python -c "import os, pathlib, zipfile; version = os.environ['VERSION_LABEL']; archive = pathlib.Path('packages') / f'axidev-osk-{version}-windows-x64.zip'; assert archive.is_file(), f'Missing standalone archive: {archive}'; root = 'axidev-osk'; required = {f'{root}/axidev-osk.exe', f'{root}/README.md', f'{root}/docs/axidev-io/consumers.md', f'{root}/third_party/axidev-io/LICENSE', f'{root}/third_party/axidev-io/vendor/licenses/stb.txt', f'{root}/third_party/axidev-io-python/LICENSE'}; names = set(zipfile.ZipFile(archive).namelist()); missing = sorted(path for path in required if path not in names); assert not missing, f'Missing required files from {archive}: {missing}'; print('standalone-archive-ok')"

      - name: Upload standalone app archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: packages/*.zip
