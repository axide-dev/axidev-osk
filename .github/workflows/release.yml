name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  source-archive:
    name: Build And Upload Source Archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build source archive
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          mkdir -p release-assets
          stage_dir="$(mktemp -d)"
          bundle_root="${stage_dir}/axidev-osk"

          mkdir -p "${bundle_root}"

          # Copy the working tree into the bundle while stripping every
          # nested .git directory/file. This gives users a clean, installable
          # source tree without any repository metadata.
          tar --exclude-vcs -cf - . | tar -xf - -C "${bundle_root}"

          # Ship both a versioned archive (for traceability) and a stable
          # filename so README install commands can curl the latest release
          # without templating a version into the URL.
          versioned_archive="${GITHUB_WORKSPACE}/release-assets/axidev-osk-${TAG}-source.zip"
          stable_archive="${GITHUB_WORKSPACE}/release-assets/axidev-osk-source.zip"

          (cd "${stage_dir}" && zip -r "${versioned_archive}" axidev-osk) > /dev/null
          cp "${versioned_archive}" "${stable_archive}"

          ls -la release-assets

      - name: Upload assets to published release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
