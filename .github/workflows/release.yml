name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  ubuntu:
    uses: ./.github/workflows/reusable-standalone-ubuntu.yml
    with:
      version-label: ${{ github.event.release.tag_name }}
      artifact-name: standalone-app-Ubuntu

  windows:
    uses: ./.github/workflows/reusable-standalone-windows.yml
    with:
      version-label: ${{ github.event.release.tag_name }}
      artifact-name: standalone-app-Windows

  publish:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [ubuntu, windows]
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          copy_one() {
            local pattern="$1"
            local mode="${2:-single}"
            mapfile -t matches < <(find artifacts -type f | grep -E "/${pattern}$" || true)
            if [ "${#matches[@]}" -eq 0 ]; then
              echo "::error::Missing expected release asset pattern: ${pattern}"
              exit 1
            fi
            if [ "$mode" = "single" ] && [ "${#matches[@]}" -ne 1 ]; then
              echo "::error::Expected exactly one match for ${pattern}, found ${#matches[@]}"
              printf '%s\n' "${matches[@]}"
              exit 1
            fi
            for src in "${matches[@]}"; do
              cp "$src" "release-assets/$(basename "$src")"
            done
          }

          copy_one "axidev-osk-${TAG}-linux-x64\\.zip"
          copy_one "axidev-osk-${TAG}-windows-x64\\.zip"

          ls -la release-assets

      - name: Upload assets to published release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
