name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Ubuntu x64
            runner: ubuntu-latest
          - label: Windows x64
            runner: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libinput-dev \
            libudev-dev \
            libxkbcommon-dev

      - name: Install Python check tools
        run: python -m pip install --upgrade pip build flake8

      - name: Lint top-level Python code
        run: |
          python -c "import os, pathlib, subprocess, sysconfig; scripts = pathlib.Path(sysconfig.get_path('scripts')); exe = scripts / ('flake8.exe' if os.name == 'nt' else 'flake8'); raise SystemExit(subprocess.run([str(exe), '--select=F,E9,W6', 'src']).returncode)"

      - name: Build and test vendored axidev-io
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: |
          python build.py clean
          python build.py test
          python build.py example

      - name: Build Linux linkage probe
        if: runner.os == 'Linux'
        shell: bash
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: python build.py integration-binaries

      - name: Verify Linux shared-library linkage
        if: runner.os == 'Linux'
        shell: bash
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: |
          set -euo pipefail

          probe="build/linux/bin/test_integration_listener"
          if [ ! -x "$probe" ]; then
            echo "::error::Missing Linux linkage probe binary: $probe"
            exit 1
          fi

          ldd_output="$(ldd "$probe")"
          printf '%s\n' "$ldd_output"

          printf '%s\n' "$ldd_output" | grep -E 'libinput\.so'
          printf '%s\n' "$ldd_output" | grep -E 'libudev\.so'
          printf '%s\n' "$ldd_output" | grep -E 'libxkbcommon\.so'

          if printf '%s\n' "$ldd_output" | grep -E 'not found'; then
            echo "::error::One or more required shared libraries were not resolved by ldd."
            exit 1
          fi

      - name: Package vendored axidev-io release archive
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: python build.py package --version ci --arch x64

      - name: Verify vendored axidev-io release archive contents
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: |
          python -c "import os, pathlib, tarfile, zipfile; root = pathlib.Path('packages'); required = {'README.md', 'LICENSE', 'docs/consumers/README.md', 'vendor/licenses/stb.txt', 'include/axidev-io/c_api.h', 'lib/libaxidev-io.a'}; pattern = '*.zip' if os.name == 'nt' else '*.tar.gz'; matches = sorted(root.glob(pattern)); assert matches, f'No package archive matching {pattern}'; archive = matches[-1]; print(f'Checking {archive}'); names = set(zipfile.ZipFile(archive).namelist()) if archive.suffix == '.zip' else {member.name.lstrip('./') for member in tarfile.open(archive, 'r:gz').getmembers() if member.isfile()}; missing = sorted(path for path in required if path not in names); assert not missing, f'Missing required files from {archive}: {missing}'; print('archive-ok')"

      - name: Install vendored axidev-io-python
        working-directory: vendor/axidev-io-python
        run: python -m pip install -e .

      - name: Build vendored axidev-io-python distributions
        working-directory: vendor/axidev-io-python
        run: python -m build

      - name: Verify vendored axidev-io-python distribution contents
        working-directory: vendor/axidev-io-python
        run: |
          python -c "import pathlib, tarfile, zipfile; dist = pathlib.Path('dist'); wheels = sorted(dist.glob('*.whl')); sdists = sorted(dist.glob('*.tar.gz')); assert wheels, 'No wheel produced'; assert sdists, 'No sdist produced'; wheel_required = {'axidev_io/vendor/axidev-io/LICENSE', 'axidev_io/vendor/axidev-io/README.md', 'axidev_io/vendor/axidev-io/docs/consumers/README.md', 'axidev_io/vendor/axidev-io/scripts/setup_uinput_permissions.sh', 'axidev_io/vendor/axidev-io/vendor/licenses/stb.txt'}; sdist_required = {'LICENSE', 'README.md', 'vendor/axidev-io/LICENSE', 'vendor/axidev-io/README.md', 'vendor/axidev-io/docs/consumers/README.md', 'vendor/axidev-io/docs/developers/README.md', 'vendor/axidev-io/scripts/setup_uinput_permissions.sh', 'vendor/axidev-io/vendor/licenses/stb.txt'}; wheel_names = set(zipfile.ZipFile(wheels[-1]).namelist()); missing_wheel = sorted(path for path in wheel_required if path not in wheel_names); assert not missing_wheel, f'Missing required files from {wheels[-1]}: {missing_wheel}'; sdist_names = {name.split('/', 1)[1] for name in tarfile.open(sdists[-1], 'r:gz').getnames() if '/' in name}; missing_sdist = sorted(path for path in sdist_required if path not in sdist_names); assert not missing_sdist, f'Missing required files from {sdists[-1]}: {missing_sdist}'; print('python-dist-ok')"

      - name: Install axidev-osk
        run: python -m pip install -e .

      - name: Run app tests
        env:
          PYTHONPATH: src
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests

      - name: Build axidev-osk distributions
        run: python -m build
