name: Build Artifacts

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Ubuntu x64
            runner: ubuntu-latest
          - label: Windows x64
            runner: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libegl1 \
            libinput-dev \
            libudev-dev \
            libxkbcommon-dev

      - name: Build and test vendored axidev-io
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: |
          python build.py clean
          python build.py test
          python build.py example

      - name: Build Linux linkage probe
        if: runner.os == 'Linux'
        shell: bash
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: python build.py integration-binaries

      - name: Verify Linux shared-library linkage
        if: runner.os == 'Linux'
        shell: bash
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: |
          set -euo pipefail

          probe="build/linux/bin/test_integration_listener"
          if [ ! -x "$probe" ]; then
            echo "::error::Missing Linux linkage probe binary: $probe"
            exit 1
          fi

          ldd_output="$(ldd "$probe")"
          printf '%s\n' "$ldd_output"

          printf '%s\n' "$ldd_output" | grep -E 'libinput\.so'
          printf '%s\n' "$ldd_output" | grep -E 'libudev\.so'
          printf '%s\n' "$ldd_output" | grep -E 'libxkbcommon\.so'

          if printf '%s\n' "$ldd_output" | grep -E 'not found'; then
            echo "::error::One or more required shared libraries were not resolved by ldd."
            exit 1
          fi

      - name: Package vendored axidev-io release archive
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: python build.py package --version manual --arch x64

      - name: Verify vendored axidev-io release archive contents
        working-directory: vendor/axidev-io-python/vendor/axidev-io
        run: |
          python -c "import os, pathlib, tarfile, zipfile; root = pathlib.Path('packages'); required = {'README.md', 'LICENSE', 'docs/consumers/README.md', 'vendor/licenses/stb.txt', 'include/axidev-io/c_api.h', 'lib/libaxidev-io.a'}; pattern = '*.zip' if os.name == 'nt' else '*.tar.gz'; matches = sorted(root.glob(pattern)); assert matches, f'No package archive matching {pattern}'; archive = matches[-1]; print(f'Checking {archive}'); names = set(zipfile.ZipFile(archive).namelist()) if archive.suffix == '.zip' else {member.name.lstrip('./') for member in tarfile.open(archive, 'r:gz').getmembers() if member.isfile()}; missing = sorted(path for path in required if path not in names); assert not missing, f'Missing required files from {archive}: {missing}'; print('archive-ok')"

      - name: Install Python packaging tools
        run: python -m pip install --upgrade pip pyinstaller

      - name: Install vendored axidev-io-python
        run: python -m pip install ./vendor/axidev-io-python

      - name: Install axidev-osk
        run: python -m pip install .

      - name: Build standalone app archive
        run: python scripts/build_standalone.py --version manual --arch x64

      - name: Verify standalone app archive contents
        run: |
          python -c "import os, pathlib, zipfile; platform_name = 'windows' if os.name == 'nt' else 'linux'; archive = pathlib.Path('packages') / f'axidev-osk-manual-{platform_name}-x64.zip'; assert archive.is_file(), f'Missing standalone archive: {archive}'; root = archive.stem; executable = 'axidev-osk.exe' if os.name == 'nt' else 'axidev-osk'; required = {f'{root}/{executable}', f'{root}/README.md', f'{root}/docs/axidev-io/consumers.md', f'{root}/third_party/axidev-io/LICENSE', f'{root}/third_party/axidev-io/vendor/licenses/stb.txt', f'{root}/third_party/axidev-io-python/LICENSE'}; os.name != 'nt' and required.add(f'{root}/docs/axidev-io/setup_uinput_permissions.sh'); names = set(zipfile.ZipFile(archive).namelist()); missing = sorted(path for path in required if path not in names); assert not missing, f'Missing required files from {archive}: {missing}'; print('standalone-archive-ok')"

      - name: Upload standalone app archive
        uses: actions/upload-artifact@v4
        with:
          name: standalone-app-${{ runner.os }}
          path: packages/*.zip
